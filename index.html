// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you

// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ─── Stars ────────────────────────────────────────────────────────────────────

function Stars({ count = 0, max = 3, size = 20 }) {
  return (
    <div style={{display:'flex', gap: 4}}>
      {Array.from({length: max}).map((_, i) => (
        <svg key={i} width={size} height={size} viewBox="0 0 20 20">
          <polygon
            points="10,2 12.4,7.5 18.5,8 14,12.2 15.5,18.2 10,15 4.5,18.2 6,12.2 1.5,8 7.6,7.5"
            fill={i < count ? '#F5BC00' : '#E0D5C0'}
            stroke={i < count ? '#E8A200' : '#C8BA9A'}
            strokeWidth="0.5"
          />
        </svg>
      ))}
    </div>
  );
}

// ─── Progress Bar ─────────────────────────────────────────────────────────────

function ProgressBar({ value = 0, max = 100, color = '#22C5A8', label }) {
  const pct = Math.min(100, Math.round((value / max) * 100));
  return (
    <div>
      {label && <div style={{fontSize:12, fontFamily:'Nunito', fontWeight:700, color:'#7A6A55', marginBottom:4}}>{label}</div>}
      <div style={{background:'#E0D5C0', borderRadius:100, height:10, overflow:'hidden'}}>
        <div style={{
          width: pct + '%', height: '100%', background: color,
          borderRadius: 100, transition: 'width 1s ease',
        }}/>
      </div>
    </div>
  );
}

// ─── Speech Bubble ────────────────────────────────────────────────────────────

function SpeechBubble({ text, character = 'coco', style = {} }) {
  const colors = { valentina: '#C1623F', tomas: '#E8A200', coco: '#22C5A8' };
  const color = colors[character] || colors.coco;
  return (
    <div style={{
      background: 'white',
      border: `3px solid ${color}`,
      borderRadius: 20,
      padding: '14px 18px',
      position: 'relative',
      maxWidth: 320,
      fontFamily: 'Nunito',
      fontSize: 15,
      color: '#3D2A1A',
      lineHeight: 1.5,
      boxShadow: `0 4px 16px ${color}33`,
      ...style
    }}>
      {text}
      <div style={{
        position:'absolute', bottom:-16, left:28,
        width:0, height:0,
        borderLeft:'10px solid transparent',
        borderRight:'10px solid transparent',
        borderTop: `16px solid ${color}`,
      }}/>
      <div style={{
        position:'absolute', bottom:-11, left:31,

function LoginScreen({ onLogin, onBack, tweaks }) {

function ActivityScreen({ username, ageGroup, onFinish, tweaks }) {
  const isJunior = ageGroup === 'junior';
  const activities = isJunior ? ACTIVITIES_JUNIOR : ACTIVITIES_EXPLORER;

  const [step, setStep] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [feedback, setFeedback] = React.useState(null);
  const [show, setShow] = React.useState(true);

  const bg = tweaks.darkMode ? 'linear-gradient(160deg, #1A2E28 0%, #0D1F1A 100%)' : 'linear-gradient(160deg, #FFF4E6 0%, #F5EAD8 100%)';
  const textMain = tweaks.darkMode ? '#E8D5C0' : '#3D2A1A';
  const textMuted = tweaks.darkMode ? '#7A9A90' : '#8A7060';
  const optBg = tweaks.darkMode ? '#162820' : 'white';
  const borderNormal = tweaks.darkMode ? '#2E4A40' : '#E0D5C0';

  const act = activities[step];

  function choose(i) {
    if (feedback) return;
    setSelected(i);
    setFeedback(i === act.correct ? 'correct' : 'wrong');
  }

  function next() {
    if (step < activities.length - 1) {
      setShow(false);
      setTimeout(() => { setStep(s=>s+1); setSelected(null); setFeedback(null); setShow(true); }, 350);
    } else { onFinish(); }
  }

  return (
    <div style={{minHeight:'100vh', background: bg, padding:'22px 18px 36px', boxSizing:'border-box'}}>
      <div style={{maxWidth:520, margin:'0 auto'}}>

        {/* Phase progress bar */}
        <div style={{marginBottom:16}}>
          <div style={{display:'flex', gap:4, marginBottom:6}}>
            {activities.map((_,i) => (
              <div key={i} style={{flex:1, height:6, borderRadius:3, background: i<=step ? tweaks.primaryColor : (tweaks.darkMode ? '#2A4038' : '#E0D5C0'), transition:'background 0.3s'}}/>
            ))}
          </div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span style={{fontFamily:'Nunito', fontSize:11, fontWeight:800, color:textMuted, textTransform:'uppercase', letterSpacing:0.8}}>
              {act.phaseIcon} {act.phase}
            </span>
            <span style={{fontFamily:'Nunito', fontSize:11, fontWeight:700, color:tweaks.primaryColor}}>{step+1}/{activities.length}</span>
          </div>
        </div>

        {/* Instruction with character */}
        <div style={{display:'flex', gap:10, alignItems:'flex-start', marginBottom:16, opacity: show ? 1 : 0, transform: show ? 'none' : 'translateY(12px)', transition:'all 0.35s ease'}}>
          <div style={{background:'#22C5A818', border:'2px solid #22C5A838', borderRadius:'50%', padding:7, flexShrink:0}}>
            <CocoAvatar size={40}/>
          </div>
          <SpeechBubble text={act.instruction} character="coco" style={{fontSize: isJunior ? 16 : 14, flex:1}}/>
        </div>

        {/* Visual */}
        <div style={{textAlign:'center', marginBottom:16, opacity: show ? 1 : 0, transition:'opacity 0.35s ease 0.08s'}}>
          <div style={{fontSize: isJunior ? 80 : 64, lineHeight:1}}>{act.image}</div>
          <div style={{fontFamily:'Nunito', fontSize:11, color:textMuted, fontWeight:600, marginTop:4}}>[{act.imageLabel}]</div>
        </div>

        {/* Options */}
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16, opacity: show ? 1 : 0, transition:'opacity 0.35s ease 0.12s'}}>
          {act.options.map((opt,i) => {
            let bg2=optBg, border=borderNormal, color=textMain;
            if (feedback && i===act.correct) { bg2='#22C5A818'; border='#22C5A8'; color='#22C5A8'; }
            if (feedback==='wrong' && i===selected) { bg2='#E74C3C12'; border='#E74C3C'; color='#E74C3C'; }
            return (
              <button key={i} onClick={() => choose(i)} style={{
                background:bg2, border:`2.5px solid ${border}`, borderRadius:14,
                padding: isJunior ? '16px 12px' : '13px 12px',
                fontFamily:'Nunito', fontSize: isJunior ? 16 : 14, fontWeight:700, color,
                cursor: feedback ? 'default' : 'pointer', transition:'all 0.2s',
                transform: (feedback && i===act.correct) ? 'scale(1.04)' : 'scale(1)',
              }}>{opt}</button>
            );
          })}
        </div>

        {/* Feedback */}
        {feedback && (
          <div style={{
            background: feedback==='correct' ? '#22C5A812' : '#E8A20012',
            border:`2px solid ${feedback==='correct' ? '#22C5A8' : '#E8A200'}`,
            borderRadius:16, padding:14, marginBottom:16,
            display:'flex', gap:10, alignItems:'flex-start',
            animation:'fadeSlideUp 0.3s ease',
          }}>
            <div style={{fontSize:22}}>{feedback==='correct' ? '🎉' : '🦜'}</div>
            <div>
              <div style={{fontFamily:'Nunito', fontSize:13, fontWeight:800, color: feedback==='correct' ? '#22C5A8' : '#E8A200', marginBottom:3}}>
                {feedback==='correct' ? '¡Muy bien!' : 'Casi lo logramos...'}
              </div>
              <div style={{fontFamily:'Nunito', fontSize:13, color:textMuted, lineHeight:1.5}}>{act.explanation}</div>
            </div>
          </div>
        )}

        {feedback && (
          <button onClick={next} style={{
            background:tweaks.primaryColor, color:'white', border:'none',
            fontFamily:'Fredoka One', fontSize:18, padding:'13px', borderRadius:100,
            cursor:'pointer', width:'100%', boxShadow:`0 6px 18px ${tweaks.primaryColor}48`,
          }}>
            {step < activities.length-1 ? 'Siguiente →' : '¡Misión completada! 🌟'}
          </button>
        )}
      </div>
    </div>
  );
}

  const isJunior = ageGroup === 'junior';
  const bg = tweaks.darkMode ? 'linear-gradient(160deg, #1A2E28 0%, #0D1F1A 100%)' : 'linear-gradient(160deg, #FFF4E6 0%, #F5EAD8 100%)';
  const textMain = tweaks.darkMode ? '#E8D5C0' : '#3D2A1A';
  const textMuted = tweaks.darkMode ? '#8A9A90' : '#8A7060';

  return (
    <div style={{minHeight:'100vh', background: bg, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, textAlign:'center'}}>
      <div style={{maxWidth:480, opacity: show ? 1 : 0, transform: show ? 'scale(1)' : 'scale(0.92)', transition:'all 0.6s cubic-bezier(0.34,1.56,0.64,1)'}}>
        <div style={{fontSize:72, marginBottom:12}}>🌟</div>
        <h1 style={{fontFamily:'Fredoka One', fontSize:'clamp(26px,7vw,38px)', color:textMain, margin:'0 0 8px'}}>
          ¡Misión cumplida, {displayName}!
        </h1>
        <p style={{fontFamily:'Nunito', fontSize:15, color:textMuted, margin:'0 0 24px', fontWeight:600, lineHeight:1.5}}>
          {isJunior
            ? '¡Lo hiciste genial! Gracias a ti completamos la aventura.'
            : 'Gracias a ti pudimos completar la misión. ¡El equipo explorador lo celebra!'}
        </p>

        {/* Characters */}
        <div style={{display:'flex', justifyContent:'center', gap:10, marginBottom:24}}>
          {[<ValentinaAvatar size={64} animate/>, <CocoAvatar size={80} animate/>, <TomasAvatar size={64} animate/>].map((ch,i) => (
            <div key={i} style={{background:'white', borderRadius:18, padding:12, boxShadow:'0 6px 20px rgba(0,0,0,0.1)'}}>{ch}</div>
          ))}
        </div>

        {/* Stars + points */}
        <div style={{background:'white', borderRadius:18, padding:16, marginBottom:16, boxShadow:'0 4px 16px rgba(0,0,0,0.07)', display:'inline-flex', flexDirection:'column', alignItems:'center', gap:6}}>
          <Stars count={3} max={3} size={28}/>
          <div style={{fontFamily:'Fredoka One', fontSize:17, color:'#E8A200'}}>+30 puntos ✨</div>
        </div>

        {/* Badge */}
        <div style={{background:`linear-gradient(135deg, ${tweaks.primaryColor}15, ${tweaks.primaryColor}28)`, border:`2px solid ${tweaks.primaryColor}60`, borderRadius:14, padding:'11px 18px', marginBottom:20, fontFamily:'Nunito', fontSize:14, fontWeight:700, color: tweaks.darkMode ? tweaks.primaryColor : '#0D7A68'}}>
          🏅 Insignia desbloqueada: "Viajero de palabras"
        </div>

        {/* Cultural collectibles */}
        <div style={{background:'white', borderRadius:18, padding:16, marginBottom:24, boxShadow:'0 4px 16px rgba(0,0,0,0.07)'}}>
          <p style={{fontFamily:'Nunito', fontSize:12, fontWeight:800, color:textMuted, textTransform:'uppercase', letterSpacing:1, marginBottom:12}}>
            🌎 Coleccionables culturales desbloqueados
          </p>
          <div style={{display:'flex', justifyContent:'center', gap:10}}>
            {COLLECTIBLES.map((c,i) => (
              <div key={i} style={{
                opacity: i <= collectedIdx ? 1 : 0.2,
                transform: i <= collectedIdx ? 'scale(1)' : 'scale(0.7)',
                transition:'all 0.4s cubic-bezier(0.34,1.56,0.64,1)',
                textAlign:'center',
              }}>
                <div style={{fontSize:36, background:`${tweaks.primaryColor}15`, borderRadius:14, padding:'10px 14px', marginBottom:4}}>{c.e}</div>
                <div style={{fontFamily:'Nunito', fontSize:10, fontWeight:700, color:textMuted}}>{c.l}</div>
                <div style={{fontFamily:'Nunito', fontSize:9, color:textMuted+'80'}}>{c.c}</div>
              </div>
            ))}
          </div>
        </div>

        <button onClick={onHome} style={{
          background:tweaks.primaryColor, color:'white', border:'none',
          fontFamily:'Fredoka One', fontSize:19, padding:'14px 36px', borderRadius:100,
          cursor:'pointer', boxShadow:`0 8px 26px ${tweaks.primaryColor}48`, transition:'transform 0.15s',
        }}
          onMouseEnter={e=>e.target.style.transform='scale(1.05)'}
          onMouseLeave={e=>e.target.style.transform='scale(1)'}
        >Volver al inicio →</button>
      </div>
    </div>
  );
}

// Export
Object.assign(window, {
  LandingScreen, LoginScreen, AvatarScreen, AgeScreen,
  DashboardScreen, MissionIntroScreen, ActivityScreen, CompleteScreen,
  MISSIONS,
});


const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#22C5A8",
  "bgFrom": "#FFF4E6",
  "bgTo": "#F5EAD8",
  "tagline": "Un programa para fortalecer el español de los hijos de familias hispanohablantes que viven fuera de su país",
  "darkMode": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('landing');
  const [username, setUsername] = React.useState('');
  const [avatarId, setAvatarId] = React.useState(null);
  const [ageGroup, setAgeGroup] = React.useState(null);
  const [isFirstLogin, setIsFirstLogin] = React.useState(true);

  React.useEffect(() => {
    try {
      const s = JSON.parse(localStorage.getItem('eh_state') || '{}');
      if (s.username) setUsername(s.username);
      if (s.avatarId) setAvatarId(s.avatarId);
      if (s.ageGroup) { setAgeGroup(s.ageGroup); setIsFirstLogin(false); }
    } catch(e) {}
  }, []);

  function persist(u, a, ag) {
    localStorage.setItem('eh_state', JSON.stringify({ username: u, avatarId: a, ageGroup: ag }));
  }

  function handleLogin(u) {
    setUsername(u);
    setScreen(isFirstLogin || !avatarId ? 'avatar' : 'dashboard');
  }

  function handleAvatar(id) { setAvatarId(id); setScreen('age'); }

  function handleAge(ag) {
    setAgeGroup(ag); setIsFirstLogin(false);
    persist(username, avatarId, ag);
    setScreen('dashboard');
  }

  const nav = setScreen;

  return (
    <div style={{minHeight:'100vh', position:'relative'}}>
      {screen === 'landing'   && <LandingScreen     tweaks={tweaks} onEnter={() => nav('login')}/>}
      {screen === 'login'     && <LoginScreen        tweaks={tweaks} onLogin={handleLogin} onBack={() => nav('landing')}/>}
      {screen === 'avatar'    && <AvatarScreen       tweaks={tweaks} username={username} onContinue={handleAvatar}/>}
      {screen === 'age'       && <AgeScreen          tweaks={tweaks} username={username} avatarId={avatarId} onContinue={handleAge}/>}
      {screen === 'dashboard' && <DashboardScreen    tweaks={tweaks} username={username} avatarId={avatarId} ageGroup={ageGroup} onMission={() => nav('mission')}/>}
      {screen === 'mission'   && <MissionIntroScreen tweaks={tweaks} username={username} ageGroup={ageGroup} onStart={() => nav('activity')} onBack={() => nav('dashboard')}/>}
      {screen === 'activity'  && <ActivityScreen     tweaks={tweaks} username={username} ageGroup={ageGroup} onFinish={() => nav('complete')}/>}
      {screen === 'complete'  && <CompleteScreen     tweaks={tweaks} username={username} ageGroup={ageGroup} onHome={() => nav('dashboard')}/>}

      <TweaksPanel>
        <TweakSection title="Colores">
          <TweakColor id="primaryColor" label="Color principal" value={tweaks.primaryColor} onChange={v => setTweak('primaryColor', v)}/>
          <TweakColor id="bgFrom" label="Fondo inicio" value={tweaks.bgFrom} onChange={v => setTweak('bgFrom', v)}/>
          <TweakColor id="bgTo" label="Fondo final" value={tweaks.bgTo} onChange={v => setTweak('bgTo', v)}/>
        </TweakSection>
        <TweakSection title="Apariencia">
          <TweakToggle id="darkMode" label="Modo oscuro" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)}/>
        </TweakSection>
        <TweakSection title="Contenido">
          <TweakText id="tagline" label="Subtítulo de portada" value={tweaks.tagline} onChange={v => setTweak('tagline', v)}/>
        </TweakSection>
        <TweakSection title="Ir a pantalla">
          <div style={{display:'flex', flexDirection:'column', gap:5}}>
            {['landing','login','avatar','age','dashboard','mission','activity','complete'].map(s => (
              <button key={s} onClick={() => nav(s)} style={{
                background: screen === s ? '#22C5A8' : '#f0f0f0',
                color: screen === s ? 'white' : '#333',
                border:'none', borderRadius:7, padding:'5px 10px',
                fontFamily:'Nunito', fontSize:12, fontWeight:700, cursor:'pointer',
                textAlign:'left', transition:'all 0.2s',
              }}>{s}</button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
